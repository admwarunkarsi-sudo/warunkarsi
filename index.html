    <script>
        const SUPABASE_URL = "https://tcaizfemtfmfeuutgbct.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_3SBNDNn6tk9Ssl6dZOxi6Q_e2ZFFH14";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let menusDataCache = [];

        let currentSlide = 0;

        let sessionUserCache = null;

        function loadMarketplaceUserSession() {
            const savedSession = localStorage.getItem('warunkarsi_user_session');

        function pemicuPencegatanLoginMP(fungsiCallbackPenerus) {
            if (sessionUserCache) {
                fungsiCallbackPenerus();
                return;
            }

            bukaModal("<i class='fa-solid fa-id-card-clip text-[#E6A15C]'></i> Masuk / Cek Member", `
                <div class='space-y-3.5 p-1 text-center'>
                    <p class='text-xs text-gray-500 leading-relaxed font-medium'>Untuk melanjutkan transaksi, cek poin reward, atau melihat antrean nota, silakan masukkan nomor WhatsApp Anda terlebih dahulu:</p>
                    <div class='space-y-2 text-left'>
                        <div class="relative">
                            <input type='text' id='mp-wa-input' placeholder='Masukkan Nomor WhatsApp (Cth: 0812...)' class='w-full border rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-[#1E4D3A] font-bold tracking-wide pr-10'>
                            <div id="mp-wa-loader" class="absolute right-3 top-3.5 hidden">
                                <i class="fa-solid fa-circle-notch animate-spin text-gray-400 text-xs"></i>
                            </div>
                            <div id="mp-wa-check" class="absolute right-3 top-3.5 hidden">
                                <i class="fa-solid fa-circle-check text-emerald-600 text-xs"></i>
                            </div>
                        </div>
                        <div id="container-mp-nama-input">
                            <input type='text' id='mp-nama-input' placeholder='Tulis Nama Lengkap Anda...' class='w-full border rounded-xl p-3 text-xs outline-none focus:ring-1 focus:ring-[#1E4D3A]'>
                        </div>
                    </div>
                    <button id='mp-btn-login' class='w-full bg-[#1E4D3A] text-white font-black py-3 rounded-xl text-xs shadow-md active:scale-95 transition mt-1'>MASUK KE SISTEM ANTREAN</button>
                </div>
            `);

            let memberTerdeteksiCache = null;
            const waInput = document.getElementById('mp-wa-input');
            const namaContainer = document.getElementById('container-mp-nama-input');
            const namaInput = document.getElementById('mp-nama-input');
            const loaderIcon = document.getElementById('mp-wa-loader');
            const checkIcon = document.getElementById('mp-wa-check');

            waInput.addEventListener('input', async () => {
                const waVal = waInput.value.trim();
                
                if (waVal.length >= 9) {
                    loaderIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                    
                    try {
                        const { data: member } = await _supabase.from('members').select('*').eq('wa', waVal).maybeSingle();
                        
                        if (member) {
                            memberTerdeteksiCache = member;
                            namaInput.value = member.nama; 
                            namaContainer.style.display = 'none'; 
                            checkIcon.classList.remove('hidden');
                        } else {
                            memberTerdeteksiCache = null;
                            namaContainer.style.display = 'block'; 
                            if(namaInput.value === (member && member.nama ? member.nama : "")) namaInput.value = "";
                        }
                    } catch (e) {
                        console.error("Gagal verifikasi nomor otomatis:", e);
                    } finally {
                        loaderIcon.classList.add('hidden');
                    }
                } else {
                    memberTerdeteksiCache = null;
                    namaContainer.style.display = 'block';
                    loaderIcon.classList.add('hidden');
                    checkIcon.classList.add('hidden');
                }
            });

            document.getElementById('mp-btn-login').onclick = async () => {
                const wa = waInput.value.trim();
                const nama = namaInput.value.trim();

                if (!wa) return alert('Mohon lengkapi Nomor WhatsApp Kakak!');
                if (wa.length < 9) return alert('Nomor WhatsApp tidak valid!');
                if (namaContainer.style.display !== 'none' && !nama) {
                    return alert('Mohon lengkapi Nama Lengkap Kakak!');
                }

                document.getElementById('mp-btn-login').innerText = "Memproses berkas cloud...";

                try {
                    let dataUserFinal = { wa: wa, nama: nama, isMember: false, id: null, poin: 0 };

                    if (memberTerdeteksiCache) {
                        dataUserFinal = { 
                            wa: memberTerdeteksiCache.wa, 
                            nama: memberTerdeteksiCache.nama, 
                            isMember: true, 
                            id: memberTerdeteksiCache.id, 
                            poin: memberTerdeteksiCache.poin 
                        };
                    } else {
                        const { data: member } = await _supabase.from('members').select('*').eq('wa', wa).maybeSingle();
                        if (member) {
                            dataUserFinal = { wa: member.wa, nama: member.nama, isMember: true, id: member.id, poin: member.poin };
                        }
                    }

                    localStorage.setItem('warunkarsi_user_session', JSON.stringify(dataUserFinal));
                    sessionUserCache = dataUserFinal;

                    alert(`Selamat Datang, ${dataUserFinal.nama}! 🎉\nStatus: ${dataUserFinal.isMember ? 'VIP Member' : 'Pelanggan Umum'}`);
                    tutupModal();
                    fungsiCallbackPenerus(); 
                } catch (err) { 
                    alert('Gagal sinkronisasi data.'); 
                } finally {
                    document.getElementById('mp-btn-login').innerText = "MASUK KE SISTEM ANTREAN";
                }
            };
        }

        function bukaModalDaftarMember() {
            setNavAktif('nav-promo');
            bukaModal("<i class='fa-solid fa-crown text-[#E6A15C]'></i> Pendaftaran Member VVIP", `
                <div class="space-y-4 p-1 text-xs">
                    <p class="text-gray-500 text-center text-[11px] leading-relaxed">Gabung menjadi VVIP Member Warunk Arsi untuk mengumpulkan poin loyalitas dan menukarkannya dengan menu sarapan gratis kami!</p>
                    <div class="space-y-3 text-left text-sm">
                        <div>
                            <label class="block text-gray-600 font-bold mb-1">Nama Lengkap</label>
                            <input type="text" id="reg-name-main" placeholder="Tulis nama lengkap Anda..." class="w-full border rounded-xl px-3.5 py-3 text-xs outline-none focus:ring-1 focus:ring-[#1E4D3A] bg-white" />
                        </div>
                        <div>
                            <label class="block text-gray-600 font-bold mb-1">No. WhatsApp</label>
                            <input type="text" id="reg-wa-main" placeholder="Contoh: 08xxxxxxxx" class="w-full border rounded-xl px-3.5 py-3 text-xs outline-none focus:ring-1 focus:ring-[#1E4D3A] bg-white" />
                        </div>
                        <button onclick="prosesSimpanDaftarMemberMain()" class="w-full bg-[#1E4D3A] text-white font-black py-3.5 rounded-xl text-xs shadow-md active:scale-95 transition mt-2 flex items-center justify-center gap-1">
                            <i class="fa-solid fa-user-plus"></i> Simpan & Daftar
                        </button>
                    </div>
                </div>
            `);
        }

        async function prosesSimpanDaftarMemberMain() {
            const nama = document.getElementById('reg-name-main').value.trim();
            const wa = document.getElementById('reg-wa-main').value.trim();

            if (!nama || !wa) return alert('Mohon lengkapi Nama Lengkap dan Nomor WhatsApp Anda!');
            if (wa.length < 9) return alert('Nomor WhatsApp yang Anda masukkan tidak valid!');

            try {
                const { data: eksis } = await _supabase.from('members').select('id').eq('wa', wa).maybeSingle();
                if (eksis) {
                    alert('Nomor WhatsApp ini sudah terdaftar sebagai Member VVIP Warunk Arsi! Silakan gunakan menu Akun untuk mengecek saldo poin.');
                    return;
                }

                const newMemberId = 'WA-' + Math.floor(1000 + Math.random() * 9000);

                const { error } = await _supabase.from('members').insert([{
                    id: newMemberId,
                    nama: nama,
                    wa: wa,
                    poin: 0
                }]);

                if (error) throw error;

                const dataUserFinal = { wa: wa, nama: nama, isMember: true, id: newMemberId, poin: 0 };
                localStorage.setItem('warunkarsi_user_session', JSON.stringify(dataUserFinal));
                sessionUserCache = dataUserFinal;

                alert(`Pendaftaran Berhasil! 🎉\n\nSelamat Kak ${nama}, Anda resmi menjadi VVIP Member Warunk Arsi.\nID Anda: ${newMemberId}\n\nSilakan bertransaksi untuk mengumpulkan poin pertamamu.`);
                tutupModal();
            } catch (err) {
                alert('Gagal melakukan pendaftaran, periksa kembali koneksi internet Anda.');
            }
        }

        async function fetchTokoSettings() {
            try {
                const { data } = await _supabase.from('toko_settings').select('*').limit(1).maybeSingle();
                if(data && data.alamat) {
                    document.getElementById('toko-alamat').innerText = data.alamat;
                }
                
                const sliderWrapper = document.getElementById('slider-wrapper');
                const dotsContainer = document.getElementById('slider-dots');
                if(!sliderWrapper || !dotsContainer) return;

                let linkGambarRaw = (data && data.banner_slides) ? data.banner_slides : "";
                if (!linkGambarRaw.trim()) {
                    linkGambarRaw = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600&auto=format&fit=crop, https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=600&auto=format&fit=crop";
                }

                const linkGambarArray = linkGambarRaw.split(',').map(link => link.trim()).filter(link => link !== "");
                sliderWrapper.innerHTML = "";
                dotsContainer.innerHTML = "";
                totalSlides = linkGambarArray.length;
                
                linkGambarArray.forEach((link, idx) => {
                    sliderWrapper.innerHTML += `
                        <div class="w-full h-full flex-shrink-0">
                            <img src="${link}" class="w-full h-full object-cover" alt="Banner ${idx+1}" onerror="this.src='https://placehold.co/600x250?text=Warunk+Arsi'">
                        </div>
                    `;
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${idx === 0 ? 'bg-white w-4' : 'bg-white/50'}`;
                    dot.id = `slider-dot-${idx}`;
                    dotsContainer.appendChild(dot);
                });
                currentSlide = 0;
                updateSlider();
            } catch(e) { console.error(e); }
        }

        function updateSlider() {
            const sw = document.getElementById('slider-wrapper');
            if (!sw || totalSlides === 0) return;
            sw.style.transform = `translateX(-${currentSlide * 100}%)`;
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.getElementById(`slider-dot-${i}`);
                if (dot) dot.className = (i === currentSlide) ? 'w-4 h-1.5 bg-white rounded-full transition-all duration-300' : 'w-1.5 h-1.5 bg-white/50 rounded-full transition-all duration-300';
            }
        }

        setInterval(() => { if (totalSlides > 1) { currentSlide = (currentSlide + 1) % totalSlides; updateSlider(); } }, 4000);

        function checkStoreStatus() {
            const sekarang = new Date();
            const hariMasehi = sekarang.getDay(); 
            const tanggal = Clinical = sekarang.getDate();
            const tahun = sekarang.getFullYear();

            const daftarHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const daftarBulan = [
                "Januari", "Februari", "Maret", "April", "Mei", "Juni", 
                "Juli", "Agustus", "September", "Oktober", "November", "Desember"
            ];

            const namaHari = daftarHari[hariMasehi];
            const namaBulan = daftarBulan[sekarang.getMonth()];
            const formatTanggalBiasa = `${tanggal < 10 ? '0' + tanggal : tanggal} ${namaBulan} ${tahun}`;

            const dateLabel = document.getElementById('realtime-date-text');
            const badge = document.getElementById('badge-status-toko');
            const dot = badge.querySelector('span:first-child');
            const textStatus = document.getElementById('text-status-toko');

            if (hariMasehi === 1) {
                dateLabel.innerText = `${namaHari}, ${formatTanggalBiasa}`;
                dateLabel.className = "text-xs font-black truncate mt-0.5 text-red-600";

        function tambahKuantitasLokal(menuId, isFlashSale) {
            tambahKeKeranjangLokal(menuId, isFlashSale);
        }

        function kurangiKuantitasLokal(menuId) {
            const indeksEksis = keranjangBelanja.findIndex(k => k.id == menuId);
            if (indeksEksis > -1) {
                keranjangBelanja[indeksEksis].qty -= 1;
                if (keranjangBelanja[indeksEksis].qty <= 0) {
                    keranjangBelanja.splice(indeksEksis, 1);
                }
            }
            updateFloatingCartBar();
            renderApplicationUi();
        }

        function tambahKeKeranjangLokal(menuId, isFlashSale) {
            const item = menusDataCache.find(m => m.id == menuId);
            const isHabis = !item || item.status === "Kosong/Habis" || item.is_tersedia === false || item.is_tersedia === 0;
            if (isHabis) return;

            const hargaFinal = isFlashSale ? item.harga_flash_sale : item.harga_normal;
            const indeksEksis = keranjangBelanja.findIndex(k => k.id == menuId);
            
            if (indeksEksis > -1) {
                keranjangBelanja[indeksEksis].qty += 1;
            } else {
                keranjangBelanja.push({
                    id: item.id,
                    nama: item.nama,
                    harga: Number(hargaFinal),
                    qty: 1
                });
            }
            updateFloatingCartBar();
            renderApplicationUi();
        }

        function updateFloatingCartBar() {
            const bar = document.getElementById('floating-cart-bar');
            const badgeCount = document.getElementById('cart-badge-count');
            const totalPreview = document.getElementById('cart-total-preview');
            
            if (keranjangBelanja.length > 0) {
                let totalItem = 0;
                let totalHarga = 0;
                
                keranjangBelanja.forEach(item => {
                    totalItem += item.qty;
                    totalHarga += (item.harga * item.qty);
                });
                
                badgeCount.innerText = totalItem;
                totalPreview.innerText = `Rp ${totalHarga.toLocaleString('id-ID')}`;
                bar.style.display = 'flex';
            } else {
                bar.style.display = 'none';
            }
        }

            const iconGosend = document.getElementById('icon-gosend');

                lblGosend.className = "border-2 border-gray-200 p-2.5 rounded-xl flex flex-col items-center justify-center text-center cursor-pointer transition hover:border-[#1E4D3A] select-none";
                iconGosend.className = "fa-solid fa-motorcycle text-gray-400 text-base mb-0.5";

                document.getElementById('container-pay-cod').style.display = 'flex';

                document.getElementById('r-gosend').checked = true;
                lblGosend.className = "border-2 border-[#1E4D3A] bg-emerald-50/30 p-2.5 rounded-xl flex flex-col items-center justify-center text-center cursor-pointer transition select-none shadow-xs";

                areaAlamat.style.display = 'block';
                document.getElementById('checkout-alamat-input').focus();
                
                document.getElementById('container-pay-cod').style.display = 'none';
                handlePaymentChoice('qris');

        function handlePaymentChoice(payType) {
            const containerCod = document.getElementById('container-pay-cod');
            const containerQris = document.getElementById('container-pay-qris');
            const iconQris = document.getElementById('icon-qris');
            const qrisDisplay = document.getElementById('qris-display-container');
            
            if(payType === 'cod') {
                document.getElementById('r-pay-cod').checked = true;
                containerCod.className = "border-2 border-[#1E4D3A] bg-emerald-50/30 p-2.5 rounded-xl flex items-center justify-between cursor-pointer transition select-none text-xs font-bold";
                containerQris.className = "border-2 border-gray-200 p-2.5 rounded-xl flex items-center justify-between cursor-pointer transition select-none text-xs font-bold";
                iconQris.className = "fa-solid fa-qrcode text-gray-600";
                qrisDisplay.style.display = 'none';
            } else if(payType === 'qris') {
                document.getElementById('r-pay-qris').checked = true;

                containerCod.className = "border-2 border-gray-200 p-2.5 rounded-xl flex items-center justify-between cursor-pointer transition select-none text-xs font-bold";

        async function downloadQrisImage() {
            const qrisImgElement = document.getElementById('qris-image');
            if(!qrisImgElement) return;
            try {
                const response = await fetch(qrisImgElement.src);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = blobUrl;
                downloadLink.download = 'QRIS_Warunk_Arsi.jpg';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
                window.URL.revokeObjectURL(blobUrl);
            } catch (err) { window.open(qrisImgElement.src, '_blank'); }
        }

        async function finalizedCheckoutProcess() {
            if (keranjangBelanja.length === 0) return;

            const total = keranjangBelanja.reduce((acc, c) => acc + (c.harga * c.qty), 0);
            const orderId = 'TX-' + Math.floor(1000 + Math.random() * 9000); 
            const noteText = document.getElementById('order-note-input').value.trim();
            const opsiAmbil = document.querySelector('input[name="opsi_ambil"]:checked').value;
            const metodeBayar = document.querySelector('input[name="metode_bayar"]:checked').value;
            const alamatTeks = document.getElementById('checkout-alamat-input') ? document.getElementById('checkout-alamat-input').value.trim() : '';

            if(opsiAmbil === 'GoSend' && !alamatTeks) {
                alert('Mohon isi alamat pengiriman lengkap rute armada kurir GoSend!');
                return;
            }

            let catatanGabungan = `[Opsi: ${opsiAmbil}] [Bayar: ${metodeBayar}]`;
            if(opsiAmbil === 'GoSend') catatanGabungan += ` Alamat: ${alamatTeks}.`;
            if(noteText) catatanGabungan += ` Catatan Tambahan: ${noteText}`;

            try {
                const { error } = await _supabase.from('orders').insert([{
                    order_id: orderId, 
                    member_id: sessionUserCache.isMember ? sessionUserCache.id : null, 
                    member_name: sessionUserCache.nama, 
                    member_wa: sessionUserCache.wa,     
                    detail_items: keranjangBelanja, 
                    total_harga: total,
                    status: "Antrean", 
                    catatan: catatanGabungan
                }]);

                if (error) throw error;

                alert(`Siap, Kak! Pesanan (${orderId}) sukses dikirim ke Kasir Warunk Arsi! 🎉`);
                
                keranjangBelanja = [];
                document.getElementById('order-note-input').value = '';
                
                tutupModal();
                updateFloatingCartBar();
                renderApplicationUi();
            } catch (err) { alert("Gagal memproses orderan ke Cloud Kasir POS."); }
        }

        function bukaModalPesanan() {

            pemicuPencegatanLoginMP(async () => {
                bukaModal("<i class='fa-solid fa-clock-rotate-left text-[#1E4D3A]'></i> Antrean Pesanan: " + sessionUserCache.nama, "<p class='text-center py-4'>Menghubungkan ke server kasir POS...</p>");
                try {
                    const query = _supabase.from('orders').select('*').order('id', { ascending: false }).limit(5);
                    if (sessionUserCache.isMember) {
                        query.eq('member_id', sessionUserCache.id);
                    } else {
                        query.eq('member_wa', sessionUserCache.wa);

                    if(!orders || orders.length === 0) {
                        document.getElementById('modal-body').innerHTML = "<p class='text-center py-4 text-gray-400 font-bold'>Belum ada riwayat antrean pesanan.</p>";

                    }
                    
                    // Simpan data orderan yang ditarik ke dalam cache lokal agar bisa dibuka detailnya sewaktu-waktu tanpa nembak database lagi
                    cacheOrdersPelanggan = orders;

                    let html = "<div class='space-y-2.5'>";
                    html += "<p class='text-[10px] text-gray-400 px-1 font-semibold'><i class='fa-solid fa-circle-info'></i> Klik pada kotak pesanan untuk melihat rincian item belanjaan.</p>";
                    
                    orders.forEach(o => {

                        if(o.status === 'Batal') badgeColor = "bg-red-100 text-red-800 border-red-200";

                        // Di sini kita tambahkan event onclick="bukaDetailAntreanSpesifik" supaya bisa diklik interaktif
                        html += `
                        <div onclick="bukaDetailAntreanSpesifik('${o.order_id || o.id}')" class='bg-white border border-gray-200/80 p-3.5 rounded-xl flex justify-between items-center shadow-xs cursor-pointer active:bg-gray-50 transition duration-100'>
                            <div>
                                <p class='font-black text-gray-800 text-xs tracking-wide flex items-center gap-1'>ORDER #${o.order_id || o.id} <i class="fa-solid fa-chevron-right text-[9px] text-gray-400"></i></p>
                                <p class='text-[11px] text-gray-500 mt-0.5 font-medium'>Total Nota: <span class="font-bold text-gray-800">Rp ${Number(o.total_harga).toLocaleString('id-ID')}</span></p>
                            </div>
                            <span class='px-2.5 py-1 rounded-full font-black text-[10px] border ${badgeColor}'>${o.status}</span>
                        </div>`;
                    });
                    document.getElementById('modal-body').innerHTML = html + "</div>";
                } catch(e) { document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Gagal memuat antrean.</p>"; }
            });
        }

        // 🌟 PERUBAHAN UTAMA: Fungsi baru untuk menampilkan detail menu hidangan dalam nota pesanan
        function bukaDetailAntreanSpesifik(idOrderDipilih) {
            const dataOrder = cacheOrdersPelanggan.find(o => (o.order_id == idOrderDipilih || o.id == idOrderDipilih));
            if(!dataOrder) return alert("Berkas data detail orderan tidak ditemukan.");

            let itemsHtml = "";
            let susunanItems = [];
            
            // Lakukan parsing aman terhadap format detail_items (baik bertipe array objek atau string json biasa)
            if (typeof dataOrder.detail_items === 'string') {
                try { susunanItems = JSON.parse(dataOrder.detail_items); } catch(e) { susunanItems = []; }
            } else if (Array.isArray(dataOrder.detail_items)) {
                susunanItems = dataOrder.detail_items;
            }

            if(susunanItems.length > 0) {
                itemsHtml = susunanItems.map(it => `
                    <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-none">
                        <div>
                            <p class="font-bold text-gray-800 text-xs">${it.nama}</p>
                            <p class="text-[10px] text-gray-400 mt-0.5">${it.qty} Porsi x Rp ${Number(it.harga).toLocaleString('id-ID')}</p>
                        </div>
                        <span class="font-black text-gray-700 text-xs">Rp ${(it.qty * it.harga).toLocaleString('id-ID')}</span>
                    </div>
                `).join('');
            } else {
                itemsHtml = "<p class='text-gray-400 italic text-center py-2'>Data rincian menu kosong.</p>";
            }

            bukaModal(`
                <div class="flex items-center gap-1.5">
                    <span onclick="bukaModalPesanan()" class="cursor-pointer text-gray-400 hover:text-gray-700 mr-1"><i class="fa-solid fa-arrow-left text-sm"></i></span> 
                    <span>Rincian Nota #${dataOrder.order_id || dataOrder.id}</span>
                </div>
            `, `
                <div class="space-y-4 p-0.5 text-xs">
                    <div class="bg-gray-50/80 p-3 rounded-xl border border-gray-100 space-y-1">
                        <p class="text-gray-500 font-medium">Pemesan: <span class="font-bold text-gray-800">${dataOrder.member_name || 'Pelanggan Umum'}</span></p>
                        <p class="text-gray-500 font-medium">WhatsApp: <span class="font-mono font-bold text-gray-800">${dataOrder.member_wa}</span></p>
                        <p class="text-gray-500 font-medium">Catatan / Rute: <span class="font-medium text-amber-900">${dataOrder.catatan || '-'}</span></p>
                    </div>

                    <div class="space-y-1">
                        <p class="font-black text-gray-700 uppercase tracking-wider text-[10px] mb-2"><i class="fa-solid fa-utensils text-[#1E4D3A]"></i> Menu Yang Dipesan:</p>
                        <div class="bg-white border rounded-xl px-3.5 py-1.5 shadow-xs">
                            ${itemsHtml}
                        </div>
                    </div>

                    <div class="flex justify-between items-center bg-[#1E4D3A]/5 border border-[#1E4D3A]/10 p-3.5 rounded-xl">
                        <div>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">Total Pembayaran</p>
                            <p class="text-sm font-black text-[#1E4D3A] mt-0.5">Rp ${Number(dataOrder.total_harga).toLocaleString('id-ID')}</p>
                        </div>
                        <span class="text-[9px] bg-amber-100 text-amber-800 border border-amber-200 px-2.5 py-1 rounded-full font-black uppercase tracking-wider">${dataOrder.status}</span>
                    </div>

                    <button onclick="bukaModalPesanan()" class="w-full bg-gray-100 text-gray-600 font-bold py-3 rounded-xl text-xs transition active:scale-98">
                        <i class="fa-solid fa-reply-all"></i> KEMBALI KE HALAMAN ANTREAN
                    </button>
                </div>
            `);
        }

        function bukaModalAkun() {
            setNavAktif('nav-akun');
            pemicuPencegatanLoginMP(() => {
                let tombolRewardHtml = sessionUserCache.isMember ? 
                    `<button onclick="bukaKatalogKuponDalamAkun()" class="w-full bg-[#E6A15C] hover:bg-amber-600 text-white font-black py-3.5 rounded-xl text-xs shadow-sm transition mt-3 flex items-center justify-center gap-1"><i class="fa-solid fa-gift"></i> Lihat Katalog Tukar Poin</button>` : '';

                bukaModal("<i class='fa-solid fa-id-card text-[#1E4D3A]'></i> Info Akun", `
                    <div class='bg-gradient-to-br from-[#1E4D3A] to-[#2d6b52] rounded-2xl p-5 text-white shadow-lg relative overflow-hidden'>
                        <p class='text-[10px] uppercase tracking-wider text-emerald-200 font-bold'>Warunk Arsi Card Session</p>
                        <h4 class='text-base font-black tracking-wide mt-1 uppercase'>${sessionUserCache.nama}</h4>
                        <div class='mt-7 flex justify-between items-end text-[11px]'>
                            <div><p class='text-[8px] text-emerald-200'>ID REGISTRASI / WA</p><p class='font-mono font-bold text-xs'>${sessionUserCache.isMember ? sessionUserCache.id : sessionUserCache.wa}</p></div>
                            <div class='text-right'><p class='text-[8px] text-emerald-200'>TABUNGAN REWARD</p><p class='font-black text-amber-300 text-base'><i class='fa-solid fa-star'></i> ${sessionUserCache.poin} Poin</p></div>
                        </div>
                    </div>
                    ${tombolRewardHtml}
                    <button onclick='localStorage.removeItem("warunkarsi_user_session"); location.reload();' class='w-full border border-red-200 hover:bg-red-50 text-red-600 font-bold py-3 rounded-xl text-xs mt-2 transition text-center block'>KELUAR / LOGOUT AKUN</button>
                `);
            });
        }

        async function bukaKatalogKuponDalamAkun() {
            bukaModal("<i class='fa-solid fa-gift text-[#E6A15C]'></i> Katalog Reward Poin", "<p class='text-center py-4'>Memuat data reward cloud...</p>");
            try {
                const { data: rewards } = await _supabase.from('rewards').select('*').order('poin_butuh', { ascending: true });
                if(!rewards || rewards.length === 0) {
                    document.getElementById('modal-body').innerHTML = "<p class='text-center py-4 text-gray-400'>Belum ada katalog reward aktif saat ini.</p>";
                    return;
                }
                let html = "<div class='space-y-2.5'>";
                rewards.forEach(r => {
                    html += `
                        <div class='border border-dashed border-[#1E4D3A]/30 bg-[#1E4D3A]/5 p-3.5 rounded-xl flex justify-between items-center'>
                            <div><p class='font-bold text-gray-800 text-xs'>${r.nama_reward}</p></div>
                            <span class='bg-[#E6A15C] text-white font-black text-[10px] px-2.5 py-1 rounded-full shadow-sm'>⭐ ${r.poin_butuh} Poin</span>
                        </div>`;
                });
                document.getElementById('modal-body').innerHTML = html + `</div><button onclick="bukaModalAkun()" class="w-full text-center text-[11px] text-gray-400 font-bold mt-2 hover:underline"><i class="fa-solid fa-arrow-left"></i> Kembali ke Profil</button>`;
            } catch(e) { document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Gagal memuat reward.</p>"; }
        }

        function setNavAktif(idTombol) {
            ['nav-beranda', 'nav-promo', 'nav-pesanan', 'nav-akun'].forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.className = (id === idTombol) 
                        ? "flex flex-col items-center gap-1 text-[#1E4D3A] font-bold transition"
                        : "flex flex-col items-center gap-1 text-gray-400 font-medium transition";
                }
            });
        }

        function berandaAction() {
            tutupModal();
            setNavAktif('nav-beranda');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function tutupModal() {
            document.getElementById('global-modal').style.display = 'none';
            setNavAktif('nav-beranda');
        }

        function bukaModal(judul, htmlContent) {
            document.getElementById('modal-title').innerHTML = judul;
            document.getElementById('modal-body').innerHTML = htmlContent;
            document.getElementById('global-modal').style.display = 'flex';
        }

        function filterCategory(categoryName) {
            selectedCategory = categoryName;
            document.getElementById('active-category-label').innerText = categoryName;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.className = tab.innerText.toUpperCase().includes(categoryName.toUpperCase())
                    ? "category-tab bg-[#1E4D3A] text-white text-xs font-bold px-4 py-2.5 rounded-xl whitespace-nowrap shadow-sm flex-shrink-0 transition"
                    : "category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-xl whitespace-nowrap shadow-sm flex-shrink-0 transition";
            });
            renderApplicationUi();
        }

        function bukaModalAlamat() {
            bukaModal("<i class='fa-solid fa-map-location-dot text-[#1E4D3A]'></i> Alamat Toko", `
                <p class='font-bold text-[#1E4D3A] text-sm'>Warunk Arsi Bekasi</p>
                <p class='leading-relaxed mt-1 text-gray-600'>Jalan Mawar IV No. 35, Rawa Bambu - Bekasi.</p>
            `);
        }

        window.onload = () => {
            loadMarketplaceUserSession();
            checkStoreStatus(); 
            fetchTokoSettings();
            fetchMenuData();
            setInterval(checkStoreStatus, 60000); 
            setInterval(fetchMenuData, 15000); 
        };
    </script>
</body>
</html>
