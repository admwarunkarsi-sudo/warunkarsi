<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warunk Arsi - Aplikasi Member & Pesan Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        html, body {
            touch-action: pan-y;
            background-color: #f3f4f6;
        }

        .kategori-scroll-lancar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-behavior: smooth;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .kategori-scroll-lancar::-webkit-scrollbar {
            display: none;
        }
        .kategori-scroll-lancar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-gray-800 font-sans pb-24 select-none">

    <div class="bg-emerald-700 text-white px-4 pt-4 pb-3 rounded-b-3xl shadow-md sticky top-0 z-40">
        <div class="max-w-md mx-auto">
            <div class="flex items-center gap-1.5 text-xs opacity-90">
                <span class="font-semibold">Alamat Pengambilan:</span>
            </div>
            <div onclick="bukaModalAlamat()" class="flex items-center justify-between mt-0.5 cursor-pointer active:opacity-80 transition">
                <div class="flex items-center gap-2 truncate pr-4">
                    <i class="fa-solid fa-location-dot text-amber-400 text-base flex-shrink-0"></i>
                    <span id="toko-alamat" class="text-sm font-bold truncate tracking-wide">Warunk Arsi, Jalan Mawar IV No. 35</span>
                </div>
                <i class="fa-solid fa-chevron-right text-xs opacity-70"></i>
            </div>

            <div class="mt-3 relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </span>
                <input type="text" id="search-menu" oninput="handleSearchMenu()" placeholder="Mau sarapan enak apa hari ini?" class="w-full bg-white text-gray-800 text-sm rounded-full pl-10 pr-4 py-2.5 focus:outline-none shadow-inner border border-gray-100">
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 mt-4 space-y-4">
        
        <div id="status-operasional-container" class="bg-white border border-gray-200 rounded-2xl p-3.5 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-700 text-base">
                    <i class="fa-solid fa-store"></i>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Operasional Warung</p>
                    <p class="text-xs font-black text-gray-700">Selasa - Minggu | 06:00 - 11:30</p>
                </div>
            </div>
            <div id="badge-status-toko" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-black shadow-sm transition-all duration-300">
                <span class="w-2 h-2 rounded-full block animate-pulse"></span>
                <span id="text-status-toko">-</span>
            </div>
        </div>

        <div id="slider-banner-container" class="relative overflow-hidden rounded-2xl shadow-sm bg-gray-200 aspect-[21/9]">
            <div id="slider-wrapper" class="flex transition-transform duration-500 ease-in-out h-full w-full">
                <div class="w-full h-full flex-shrink-0">
                    <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600&auto=format&fit=crop" class="w-full h-full object-cover" alt="Promo">
                </div>
            </div>
            <div id="slider-dots" class="absolute bottom-2 inset-x-0 flex justify-center gap-1.5"></div>
        </div>

        <div class="kategori-scroll-lancar py-1">
            <button onclick="filterCategory('Semua')" class="category-tab bg-emerald-700 text-white text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">Semua</button>
            <button onclick="filterCategory('pernasian')" class="category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">🍚 PERNASIAN</button>
            <button onclick="filterCategory('RAMUAN ARSI')" class="category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">🍹 RAMUAN ARSI</button>
            <button onclick="filterCategory('KUE')" class="category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">🍰 KUE</button>
            <button onclick="filterCategory('GORENGAN')" class="category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">🍤 GORENGAN</button>
            <button onclick="filterCategory('LAINNYA')" class="category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition">✨ LAINNYA</button>
        </div>

        <div id="section-flash-sale" class="space-y-2 hidden">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-1.5 text-red-600 font-black text-sm uppercase tracking-wide">
                    <i class="fa-solid fa-fire text-base animate-pulse"></i>
                    <h2>Flash Sale Terbatas!</h2>
                </div>
            </div>
            <div id="flash-sale-container" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar"></div>
        </div>

        <div class="space-y-2.5">
            <div class="flex justify-between items-center border-b border-gray-200 pb-1.5">
                <h2 class="font-black text-gray-700 text-sm uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-star text-amber-500"></i> Rekomendasi Menu Terlaris
                </h2>
                <span id="active-category-label" class="bg-emerald-100 text-emerald-800 text-[10px] font-extrabold px-2 py-0.5 rounded-full uppercase">Semua</span>
            </div>
            
            <div id="regular-menu-container" class="grid grid-cols-2 gap-3">
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-2.5 animate-pulse">
                    <div class="w-full h-28 bg-gray-200 rounded-xl"></div>
                    <div class="h-4 bg-gray-200 rounded mt-2 w-3/4"></div>
                    <div class="h-4 bg-gray-200 rounded mt-3 w-1/2"></div>
                </div>
                <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-2.5 animate-pulse">
                    <div class="w-full h-28 bg-gray-200 rounded-xl"></div>
                    <div class="h-4 bg-gray-200 rounded mt-2 w-3/4"></div>
                    <div class="h-4 bg-gray-200 rounded mt-3 w-1/2"></div>
                </div>
            </div>
        </div>

    </div>

    <div id="floating-cart-bar" class="fixed bottom-16 inset-x-0 mx-auto max-w-md px-4 z-50 hidden transition-all duration-300">
        <div onclick="bukaModalKeranjang()" class="bg-amber-500 text-white px-4 py-3 rounded-2xl shadow-xl flex justify-between items-center cursor-pointer active:scale-98 transition">
            <div class="flex items-center gap-2.5">
                <div class="relative bg-amber-600 w-8 h-8 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-basket-shopping text-sm"></i>
                    <span id="cart-badge-count" class="absolute -top-1.5 -right-1.5 bg-red-600 text-white font-black text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
                </div>
                <div>
                    <p class="text-[10px] uppercase font-bold tracking-wider opacity-90">Keranjang Belanja</p>
                    <p id="cart-total-preview" class="text-xs font-black">Rp 0</p>
                </div>
            </div>
            <div class="flex items-center gap-1 bg-white/20 px-2.5 py-1 rounded-lg text-[11px] font-black uppercase tracking-wide">
                Lihat <i class="fa-solid fa-chevron-right text-[9px]"></i>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 shadow-2xl py-2 px-6 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center text-center">
            <button onclick="berandaAction()" id="nav-beranda" class="flex flex-col items-center gap-0.5 text-emerald-700 font-bold transition">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px]">Beranda</span>
            </button>
            <button onclick="bukaModalPromo()" id="nav-promo" class="flex flex-col items-center gap-0.5 text-gray-400 font-medium transition">
                <i class="fa-solid fa-percent text-lg"></i>
                <span class="text-[10px]">Promo</span>
            </button>
            <button onclick="bukaModalPesanan()" id="nav-pesanan" class="flex flex-col items-center gap-0.5 text-gray-400 font-medium transition">
                <i class="fa-solid fa-clipboard-list text-lg"></i>
                <span class="text-[10px]">Pesanan Saya</span>
            </button>
            <button onclick="bukaModalAkun()" id="nav-akun" class="flex flex-col items-center gap-0.5 text-gray-400 font-medium transition">
                <i class="fa-solid fa-user text-lg"></i>
                <span class="text-[10px]">Akun Saya</span>
            </button>
        </div>
    </div>

    <div id="global-modal" class="fixed inset-0 bg-black/50 hidden items-end justify-center z-50 p-4 transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-5 space-y-4 shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 id="modal-title" class="font-black text-gray-800 text-sm uppercase tracking-wide flex items-center gap-2"></h3>
                <button onclick="tutupModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="modal-body" class="text-xs text-gray-600 space-y-3"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tcaizfemtfmfeuutgbct.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_3SBNDNn6tk9Ssl6dZOxi6Q_e2ZFFH14";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let menusDataCache = [];
        let selectedCategory = "Semua";
        let currentSlide = 0;
        let totalSlides = 0;
        let keranjangBelanja = [];

        const USER_MEMBER_ID = "M001"; 

        // 1. SETTING BANNER SLIDER
        async function fetchTokoSettings() {
            try {
                const { data, error } = await _supabase.from('toko_settings').select('*').limit(1).maybeSingle();
                if(data && data.alamat) {
                    document.getElementById('toko-alamat').innerText = data.alamat;
                }
                
                const sliderWrapper = document.getElementById('slider-wrapper');
                const dotsContainer = document.getElementById('slider-dots');
                if(!sliderWrapper || !dotsContainer) return;

                let linkGambarRaw = (data && data.banner_slides) ? data.banner_slides : "";
                if (!linkGambarRaw.trim()) {
                    linkGambarRaw = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=600&auto=format&fit=crop, https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=600&auto=format&fit=crop";
                }

                const linkGambarArray = linkGambarRaw.split(',').map(link => link.trim()).filter(link => link !== "");
                sliderWrapper.innerHTML = "";
                dotsContainer.innerHTML = "";
                totalSlides = linkGambarArray.length;
                
                linkGambarArray.forEach((link, idx) => {
                    sliderWrapper.innerHTML += `
                        <div class="w-full h-full flex-shrink-0">
                            <img src="${link}" class="w-full h-full object-cover" alt="Banner ${idx+1}" onerror="this.src='https://placehold.co/600x250?text=Warunk+Arsi'">
                        </div>
                    `;
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${idx === 0 ? 'bg-white w-4' : 'bg-white/50'}`;
                    dot.id = `slider-dot-${idx}`;
                    dotsContainer.appendChild(dot);
                });
                currentSlide = 0;
                updateSlider();
            } catch(e) { console.error(e); }
        }

        function updateSlider() {
            const sw = document.getElementById('slider-wrapper');
            if (!sw || totalSlides === 0) return;
            sw.style.transform = `translateX(-${currentSlide * 100}%)`;
            for (let i = 0; i < totalSlides; i++) {
                const dot = document.getElementById(`slider-dot-${i}`);
                if (dot) dot.className = (i === currentSlide) ? 'w-4 h-1.5 bg-white rounded-full transition-all duration-300' : 'w-1.5 h-1.5 bg-white/50 rounded-full transition-all duration-300';
            }
        }

        setInterval(() => { if (totalSlides > 1) { currentSlide = (currentSlide + 1) % totalSlides; updateSlider(); } }, 4000);

        // 2. JAM OPERASIONAL
        function checkStoreStatus() {
            const sekarang = new Date();
            const hari = Clinical = sekarang.getDay();
            const waktuMenit = (sekarang.getHours() * 60) + sekarang.getMinutes();
            const batasBuka = (6 * 60); 
            const batasTutup = (11 * 60) + 30; 

            const badge = document.getElementById('badge-status-toko');
            const dot = badge.querySelector('span:first-child');
            const text = document.getElementById('text-status-toko');

            if (hari === 1) {
                badge.className = "flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-black bg-red-50 text-red-600 border border-red-100";
                dot.className = "w-2 h-2 rounded-full block bg-red-600 animate-pulse";
                text.innerText = "Tutup (Libur)";
            } else if (waktuMenit >= batasBuka && waktuMenit <= batasTutup) {
                badge.className = "flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-black bg-emerald-50 text-emerald-700 border border-emerald-100";
                dot.className = "w-2 h-2 rounded-full block bg-emerald-600 animate-pulse";
                text.innerText = "Buka";
            } else {
                badge.className = "flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-black bg-gray-100 text-gray-500 border border-gray-200";
                dot.className = "w-2 h-2 rounded-full block bg-gray-400";
                text.innerText = "Tutup";
            }
        }

        // 3. TARIK DATA SUPABASE
        async function fetchMenuData() {
            try {
                const { data, error } = await _supabase.from('menu').select('*').order('id', { ascending: true });
                if (!error && data) {
                    menusDataCache = data;
                    renderApplicationUi();
                }
            } catch (e) { console.error("Gagal sinkron data menu:", e); }
        }

        function handleSearchMenu() {
            const searchKeyword = document.getElementById('search-menu').value.toLowerCase().trim();
            
            const statusOperasional = document.getElementById('status-operasional-container');
            const sliderBanner = document.getElementById('slider-banner-container');
            const sectionFlashSale = document.getElementById('section-flash-sale');

            if (searchKeyword.length > 0) {
                if (statusOperasional) statusOperasional.classList.add('hidden');
                if (sliderBanner) sliderBanner.classList.add('hidden');
                if (sectionFlashSale) sectionFlashSale.classList.add('hidden');
            } else {
                if (statusOperasional) statusOperasional.classList.remove('hidden');
                if (sliderBanner) sliderBanner.classList.remove('hidden');
            }

            renderApplicationUi();
        }

        function renderApplicationUi() {
            const searchKeyword = document.getElementById('search-menu').value.toLowerCase().trim();
            
            const sectionFlashSale = document.getElementById('section-flash-sale');
            const flashSaleContainer = document.getElementById('flash-sale-container');
            
            // FIX LOGIKA: Filter flash sale hanya yang berharga flash sale DAN statusnya bukan "Kosong/Habis"
            const flashSaleItems = menusDataCache.filter(m => Number(m.harga_flash_sale) > 0 && m.status !== "Kosong/Habis");
            
            if(flashSaleItems.length > 0 && !searchKeyword && selectedCategory === "Semua") {
                sectionFlashSale.classList.remove('hidden');
                flashSaleContainer.innerHTML = flashSaleItems.map(item => `
                    <div class="w-32 bg-white rounded-xl shadow-sm border border-red-100 p-2 flex-shrink-0 flex flex-col justify-between">
                        <div class="relative">
                            <span class="absolute top-0 left-0 bg-red-600 text-white font-black text-[8px] px-1.5 py-0.5 rounded uppercase animate-pulse">Sale 🔥</span>
                            <img src="${item.gambar_url || 'https://placehold.co/150?text=Warunk+Arsi'}" alt="${item.nama}" class="w-full h-20 object-cover rounded-lg mb-1.5 bg-gray-50">
                        </div>
                        <div>
                            <h3 class="text-xs font-bold text-gray-700 truncate">${item.nama}</h3>
                            <p class="text-[10px] text-red-600 font-extrabold mt-0.5">Rp ${Number(item.harga_flash_sale).toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="tambahKeKeranjangLokal('${item.id}', true)" class="w-full bg-red-600 text-white text-[10px] font-black py-1 rounded-lg mt-2 shadow-sm active:scale-95 transition">BELI</button>
                    </div>
                `).join('');
            } else {
                // Otomatis tersembunyi total jika semua produk flash sale statusnya "Kosong/Habis"
                sectionFlashSale.classList.add('hidden');
            }

            // Render Produk Utama Grid
            const regularContainer = document.getElementById('regular-menu-container');
            let filteredItems = menusDataCache;
            
            if (selectedCategory !== "Semua") {
                filteredItems = filteredItems.filter(m => m.kategori.toLowerCase().trim().includes(selectedCategory.toLowerCase().trim()));
            }
            if (searchKeyword) {
                filteredItems = filteredItems.filter(m => m.nama.toLowerCase().includes(searchKeyword));
            }

            if(filteredItems.length === 0) {
                regularContainer.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-400 bg-white rounded-2xl border p-4"><p class="text-xs font-bold">Hidangan tidak ditemukan.</p></div>`;
                return;
            }

            regularContainer.innerHTML = filteredItems.map(item => {
                const isFsActive = Number(item.harga_flash_sale) > 0;
                const hargaTampil = isFsActive ? item.harga_flash_sale : item.harga_normal;
                
                // FIX LOGIKA: Cek apakah status item "Kosong/Habis"
                const isHabis = item.status === "Kosong/Habis";
                
                return `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-2.5 flex flex-col justify-between relative ${isHabis ? 'opacity-60' : ''}">
                        <div>
                            <div class="relative">
                                <img src="${item.gambar_url || 'https://placehold.co/150?text=Warunk+Arsi'}" alt="${item.nama}" class="w-full h-28 object-cover rounded-xl bg-gray-50 border">
                                ${isHabis ? `<div class="absolute inset-0 bg-black/40 rounded-xl flex items-center justify-center"><span class="bg-black text-white text-[10px] font-black px-2 py-1 rounded uppercase">Habis</span></div>` : ''}
                            </div>
                            <div class="mt-2 space-y-0.5">
                                <span class="text-[9px] text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded font-extrabold uppercase">${item.kategori}</span>
                                <h3 class="text-xs font-bold text-gray-800 line-clamp-2 pt-0.5">${item.nama}</h3>
                            </div>
                        </div>
                        <div class="mt-3">
                            <span class="text-xs font-black text-emerald-700">Rp ${Number(hargaTampil).toLocaleString('id-ID')}</span>
                            <button 
                                onclick="${isHabis ? "alert('Stok produk ini sedang habis!')" : `tambahKeKeranjangLokal('${item.id}', ${isFsActive})`}" 
                                class="w-full ${isHabis ? 'bg-gray-400 cursor-not-allowed' : 'bg-emerald-700 active:scale-95'} text-white text-[11px] font-black py-1.5 rounded-xl mt-2 flex items-center justify-center gap-1 transition">
                                <i class="fa-solid ${isHabis ? 'fa-boxes-empty' : 'fa-cart-plus'} text-[10px]"></i> ${isHabis ? 'HABIS' : 'PESAN'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 4. KERANJANG BELANJA
        function tambahKeKeranjangLokal(menuId, isFlashSale) {
            const item = menusDataCache.find(m => m.id == menuId);
            if (!item || item.status === "Kosong/Habis") return; // Proteksi ganda agar tidak bisa dibeli jika habis

            const hargaFinal = isFlashSale ? item.harga_flash_sale : item.harga_normal;
            const indeksEksis = keranjangBelanja.findIndex(k => k.id == item.id);
            
            if (indeksEksis > -1) {
                keranjangBelanja[indeksEksis].qty += 1;
            } else {
                keranjangBelanja.push({
                    id: item.id,
                    nama: item.nama,
                    harga: Number(hargaFinal),
                    qty: 1
                });
            }
            updateFloatingCartBar();
        }

        function ubahKuantitasKeranjang(indeks, perubahan) {
            keranjangBelanja[indeks].qty += perubahan;
            if (keranjangBelanja[indeks].qty <= 0) {
                keranjangBelanja.splice(indeks, 1);
            }
            
            updateFloatingCartBar();
            if (keranjangBelanja.length > 0) {
                renderKontenModalKeranjang();
            } else {
                tutupModal();
            }
        }

        function updateFloatingCartBar() {
            const bar = document.getElementById('floating-cart-bar');
            const badgeCount = document.getElementById('cart-badge-count');
            const totalPreview = document.getElementById('cart-total-preview');
            
            if (keranjangBelanja.length > 0) {
                let totalItem = 0;
                let totalHarga = 0;
                
                keranjangBelanja.forEach(item => {
                    totalItem += item.qty;
                    totalHarga += (item.harga * item.qty);
                });
                
                badgeCount.innerText = totalItem;
                totalPreview.innerText = `Rp ${totalHarga.toLocaleString('id-ID')}`;
                bar.classList.remove('hidden');
            } else {
                bar.classList.add('hidden');
            }
        }

        function bukaModalKeranjang() {
            bukaModal("<i class='fa-solid fa-basket-shopping text-amber-500'></i> Keranjang Anda", "");
            renderKontenModalKeranjang();
        }

        function renderKontenModalKeranjang() {
            let totalHarga = 0;
            let html = "<div class='space-y-3'>";
            
            keranjangBelanja.forEach((item, idx) => {
                const subTotal = item.harga * item.qty;
                totalHarga += subTotal;
                
                html += `
                    <div class="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100">
                        <div class="max-w-[60%]">
                            <p class="font-bold text-gray-800 text-xs truncate">${item.nama}</p>
                            <p class="text-[10px] text-emerald-700 font-black mt-0.5">Rp ${item.harga.toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-2 bg-white border rounded-lg p-0.5 shadow-sm">
                                <button onclick="ubahKuantitasKeranjang(${idx}, -1)" class="w-6 h-6 bg-gray-100 rounded text-gray-600 font-bold text-xs flex items-center justify-center">-</button>
                                <span class="text-xs font-black px-1 min-w-[12px] text-center">${item.qty}</span>
                                <button onclick="ubahKuantitasKeranjang(${idx}, 1)" class="w-6 h-6 bg-emerald-700 text-white rounded font-bold text-xs flex items-center justify-center">+</button>
                            </div>
                            <p class="text-xs font-black text-gray-700 min-w-[65px] text-right">Rp ${subTotal.toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                `;
            });
            
            html += `
                <div class="pt-2 border-t flex justify-between items-center">
                    <p class="text-xs font-bold text-gray-500">Total Pembayaran:</p>
                    <p class="text-sm font-black text-emerald-700">Rp ${totalHarga.toLocaleString('id-ID')}</p>
                </div>
                <button onclick="prosesCheckoutKeCloud()" class="w-full bg-emerald-700 text-white text-xs font-black py-3 rounded-xl mt-2 shadow-md flex items-center justify-center gap-2 active:scale-98 transition">
                    <i class="fa-solid fa-paper-plane"></i> KIRIM PESANAN KE KASIR
                </button>
            </div>`;
            
            document.getElementById('modal-body').innerHTML = html;
        }

        async function prosesCheckoutKeCloud() {
            if (keranjangBelanja.length === 0) return;

            let totalHargaOrder = 0;
            keranjangBelanja.forEach(item => totalHargaOrder += (item.harga * item.qty));

            const konfirmasi = confirm(`Kirim pesanan ke antrean kasir? Total: Rp ${totalHargaOrder.toLocaleString('id-ID')}`);
            if (!konfirmasi) return;

            try {
                const { data: member } = await _supabase.from('members').select('nama, wa').eq('id', USER_MEMBER_ID).maybeSingle();
                
                const dataOrder = {
                    member_id: USER_MEMBER_ID,
                    nama_pelanggan: member ? member.nama : "Pelanggan Umum",
                    wa_pelanggan: member ? member.wa : "-",
                    items: JSON.stringify(keranjangBelanja), 
                    total_harga: totalHargaOrder,
                    status: "Pending"
                };

                await _supabase.from('orders').insert([dataOrder]);
                
                keranjangBelanja = [];
                updateFloatingCartBar();
                
                alert(`Pesanan Berhasil terkirim ke kasir! 🎉`);
                bukaModalPesanan(); 
            } catch (err) {
                alert("Gagal mengirim pesanan, periksa jaringan internet anda.");
            }
        }

        // 5. UTILITY WINDOW & NAVIGATION
        function setNavAktif(idTombol) {
            ['nav-beranda', 'nav-promo', 'nav-pesanan', 'nav-akun'].forEach(id => {
                document.getElementById(id).className = (id === idTombol) 
                    ? "flex flex-col items-center gap-0.5 text-emerald-700 font-bold transition"
                    : "flex flex-col items-center gap-0.5 text-gray-400 font-medium transition";
            });
        }

        function bukaModal(judul, htmlContent) {
            document.getElementById('modal-title').innerHTML = judul;
            document.getElementById('modal-body').innerHTML = htmlContent;
            const m = document.getElementById('global-modal');
            m.classList.remove('hidden'); m.classList.add('flex');
        }

        function tutupModal() {
            const m = document.getElementById('global-modal');
            m.classList.add('hidden'); m.classList.remove('flex');
            setNavAktif('nav-beranda');
        }

        function berandaAction() {
            tutupModal();
            setNavAktif('nav-beranda');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function filterCategory(categoryName) {
            selectedCategory = categoryName;
            document.getElementById('active-category-label').innerText = categoryName;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.className = tab.innerText.toUpperCase().includes(categoryName.toUpperCase())
                    ? "category-tab bg-emerald-700 text-white text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition"
                    : "category-tab bg-white text-gray-500 border border-gray-200 text-xs font-bold px-4 py-2.5 rounded-full whitespace-nowrap shadow-sm flex-shrink-0 transition";
            });
            renderApplicationUi();
        }

        function bukaModalAlamat() {
            bukaModal("<i class='fa-solid fa-map-location-dot text-emerald-700'></i> Alamat Toko", `
                <p class='font-bold text-emerald-800 text-sm'>Warunk Arsi Headquarter</p>
                <p class='leading-relaxed mt-1'>Jalan Mawar IV No. 35, Bekasi Utara.</p>
            `);
        }

        async function bukaModalPromo() {
            setNavAktif('nav-promo');
            bukaModal("<i class='fa-solid fa-tags text-amber-500'></i> Kupon Reward", "<p class='text-center py-4'>Memuat kupon...</p>");
            try {
                const { data: rewards } = await _supabase.from('rewards').select('*').order('poin_butuh', { ascending: true });
                if(!rewards || rewards.length === 0) {
                    document.getElementById('modal-body').innerHTML = "<p class='text-center py-4 text-gray-400'>Belum ada kupon reward aktif.</p>";
                    return;
                }
                let html = "<div class='space-y-2'>";
                rewards.forEach(r => {
                    html += `<div class='border border-dashed border-emerald-300 bg-emerald-50 p-3 rounded-xl flex justify-between items-center'>
                        <div><p class='font-bold text-gray-800'>${r.nama_reward}</p></div>
                        <span class='bg-amber-500 text-white font-black text-[10px] px-2 py-1 rounded-full'>⭐ ${r.poin_butuh} Poin</span>
                    </div>`;
                });
                document.getElementById('modal-body').innerHTML = html + "</div>";
            } catch(e) { document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Belum ada data reward tersedia.</p>"; }
        }

        async function bukaModalPesanan() {
            setNavAktif('nav-pesanan');
            bukaModal("<i class='fa-solid fa-clock-rotate-left text-blue-600'></i> Antrean Pesanan", "<p class='text-center py-4'>Memuat data antrean...</p>");
            try {
                const { data: orders } = await _supabase.from('orders').select('*').eq('member_id', USER_MEMBER_ID).order('id', { ascending: false }).limit(5);
                if(!orders || orders.length === 0) {
                    document.getElementById('modal-body').innerHTML = "<p class='text-center py-4 text-gray-400 font-bold'>Belum ada riwayat antrean pesanan.</p>";
                    return;
                }
                let html = "<div class='space-y-2'>";
                orders.forEach(o => {
                    let c = o.status === "Selesai" ? "bg-emerald-100 text-emerald-800" : "bg-amber-100 text-amber-800";
                    html += `<div class='bg-white border p-3 rounded-xl flex justify-between items-center shadow-sm'>
                        <div><p class='font-bold text-gray-800 text-xs'>ORDER #${o.id}</p><p class='text-[11px] text-gray-400'>Total: Rp ${Number(o.total_harga).toLocaleString('id-ID')}</p></div>
                        <span class='px-2 py-0.5 rounded-full font-black text-[10px] ${c}'>${o.status}</span>
                    </div>`;
                });
                document.getElementById('modal-body').innerHTML = html + "</div>";
            } catch(e) { document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Gagal memuat antrean cloud.</p>"; }
        }

        async function bukaModalAkun() {
            setNavAktif('nav-akun');
            bukaModal("<i class='fa-solid fa-id-card text-emerald-700'></i> Profil VVIP Member", "<p class='text-center py-4'>Menghubungkan akun...</p>");
            try {
                const { data: m } = await _supabase.from('members').select('*').eq('id', USER_MEMBER_ID).maybeSingle();
                if(!m) {
                    document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Akun member belum terdaftar.</p>";
                    return;
                }
                document.getElementById('modal-body').innerHTML = `
                    <div class='bg-gradient-to-br from-emerald-800 to-teal-600 rounded-2xl p-4 text-white shadow-md relative overflow-hidden'>
                        <p class='text-[10px] uppercase tracking-wider text-emerald-200 font-bold'>Warunk Arsi Member Card</p>
                        <h4 class='text-sm font-black tracking-wide mt-1 uppercase'>${m.nama}</h4>
                        <div class='mt-6 flex justify-between items-end text-[11px]'>
                            <div><p class='text-[8px] text-emerald-200'>ID MEMBER</p><p class='font-mono font-bold'>${m.id}</p></div>
                            <div class='text-right'><p class='text-[8px] text-emerald-200'>TABUNGAN REWARD</p><p class='font-bold text-amber-300'><i class='fa-solid fa-star'></i> ${m.poin || 0} Poin</p></div>
                        </div>
                    </div>
                `;
            } catch(e) { document.getElementById('modal-body').innerHTML = "<p class='text-center py-2'>Gagal sinkron data akun digital.</p>"; }
        }

        // INITIALIZER ENTRY POINT
        window.onload = () => {
            checkStoreStatus();
            fetchTokoSettings();
            fetchMenuData();
            setInterval(checkStoreStatus, 60000);
            setInterval(fetchMenuData, 15000); 
        };
    </script>
</body>
</html>
